<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diane's Context Panel</title>

  <!-- Missive's design system stylesheet — provides theme variables, light/dark support -->
  <link rel="stylesheet" href="https://integrations.missiveapp.com/missive.css">

  <style>
    /* =====================================================================
       MISSIVE THEME INTEGRATION  🎨
       Colors inherit from Missive's design system (light/dark via data-theme).
       Fallbacks ensure the panel works if Missive stylesheet hasn't loaded yet.
       ===================================================================== */
    :root {
      /* Colors — light mode (default) */
      --bg:            #f6f4ef;
      --panel:         #ffffff;
      --card:          #ffffff;
      --card-border:   #ece7dd;
      --ink:           #2e2a25;   /* primary text */
      --ink-soft:      #847c70;   /* secondary text */

      /* Accent — warm orange (cohesive with Diane's aesthetic, not Missive blue) */
      --accent:        #b3683f;   /* warm highlight — Diane's color */
      --accent-soft:   #f3e7df;   /* soft wash of the accent */
      --good:          #3f7d57;   /* "matched / confirmed" green */
      --note-bg:       #faf7f1;   /* background of each saved note */
      --cowork-bg:     #f3e7df;   /* CoWork strip soft accent background */
      --cowork-ink:    #2e2a25;   /* CoWork text — black */
      --cowork-reply:  #faf7f1;   /* CoWork reply bubble — softer bg */

      /* Spacing & shape */
      --gap:           14px;      /* space between cards */
      --card-pad:      14px;      /* padding inside each card */
      --radius:        14px;      /* roundness of corners */
      --panel-width:   360px;     /* how wide the panel is */

      /* Type — align with Missive (14px body, system font stack) */
      --font:          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --label-size:    11px;      /* the small ALL-CAPS card labels */
      --body-size:     14px;      /* normal text (matches Missive) */
      --title-size:    15px;      /* card headlines */
    }

    /* Dark mode — respects user's system/browser preference */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #1a1a1a;
        --panel:         #262626;
        --card:          #323232;
        --card-border:   #404040;
        --ink:           #f5f5f5;
        --ink-soft:      #b0b0b0;
        --note-bg:       #3a3a3a;
        --cowork-bg:     #3a3a3a;
        --cowork-ink:    #f5f5f5;
        --cowork-reply:  #454545;
        --accent-soft:   #4a3a32;   /* darker wash of accent for dark mode */
      }
    }
    /* ---- frame ---- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: var(--font);
      color: var(--ink);
      display: flex;
      justify-content: center;
      padding: 28px 16px;
      line-height: 1.45;
    }
    .panel {
      width: var(--panel-width);
      background: var(--panel);
      border-radius: calc(var(--radius) + 4px);
      padding: var(--gap);
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ---- the email header (who/what we're looking at) ---- */
    .email {
      padding: 4px 4px 0;
    }
    .email .subject {
      font-size: var(--title-size);
      font-weight: 650;
      margin-bottom: 4px;
    }
    .email .from {
      font-size: var(--body-size);
      color: var(--ink-soft);
    }
    .email .from b { color: var(--ink); font-weight: 600; }
    .email .preview {
      font-size: 13px;
      color: var(--ink-soft);
      font-style: italic;
      margin-top: 6px;
    }

    /* ---- the reusable card ---- */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: var(--card-pad);
    }
    .card .label {
      font-size: var(--label-size);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 700;
      margin-bottom: 8px;
      display: block;
      background: transparent;
      padding: 0;
      line-height: 1.2;
    }
    .card .headline {
      font-size: var(--title-size);
      font-weight: 600;
      margin-bottom: 2px;
    }
    .card .sub {
      font-size: var(--body-size);
      color: var(--ink-soft);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 6px 0;
      border-top: 1px solid var(--card-border);
    }
    .row:first-of-type { border-top: none; }
    .row .main { font-size: var(--body-size); }
    .row .meta { font-size: 12px; color: var(--ink-soft); white-space: nowrap; }

    /* ---- documents list (scrollable) ---- */
    .documents-list {
      max-height: 140px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* ---- meetings list (scrollable) ---- */
    .meetings-list {
      max-height: 140px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .documents-list .row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 7px 0;
    }
    .documents-list .row:first-of-type { border-top: none; }
    .documents-list .doc-title {
      font-size: var(--body-size);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      margin-bottom: 2px;
    }
    .documents-list .doc-location {
      font-size: 12px;
      color: var(--ink-soft);
    }

    .pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      margin-left: 6px;
      vertical-align: middle;
    }
    .pill.good { background: #e3efe7; color: var(--good); }

    .nextstep {
      margin-top: 10px;
      padding: 9px 10px;
      background: var(--accent-soft);
      border-radius: 10px;
      font-size: 13px;
    }
    .nextstep b { color: var(--accent); }

    .kicker { color: var(--accent); font-weight: 700; }

    /* ---- attachments list (scrollable) ---- */
    .attachments-list {
      max-height: 140px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* ---- notes (Mesh) ---- */
    .note {
      background: var(--note-bg);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: var(--body-size);
      margin-bottom: 6px;
    }
    .note:last-of-type { margin-bottom: 0; }

    .note-list-scrollable {
      max-height: 160px;
      overflow-y: auto;
      padding-right: 4px;
      margin: 10px 0;
    }

    .note-add {
      display: flex;
      gap: 6px;
      margin-top: 0;
    }
    .note-add input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 9px 10px;
      font-family: var(--font);
      font-size: var(--body-size);
      color: var(--ink);
      background: #fff;
    }
    .note-add input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
    .note-add button {
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: var(--body-size);
      font-weight: 650;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .note-add button:hover { filter: brightness(1.05); }

    /* ---- attachment filing notes ---- */
    .attachment-row {
      padding: 7px 0;
      border-top: 1px solid var(--card-border);
    }
    .attachment-row:first-of-type { border-top: none; }
    .attachment-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .attachment-name { font-size: var(--body-size); flex: 1; min-width: 0; }
    .attachment-size { font-size: 12px; color: var(--ink-soft); white-space: nowrap; }
    .file-note-btn {
      background: none;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 11px;
      color: var(--ink-soft);
      padding: 3px 9px;
      cursor: pointer;
      white-space: nowrap;
      margin-top: 4px;
    }
    .file-note-btn:hover { border-color: var(--accent); color: var(--accent); }
    .file-note-area {
      display: none;
      margin-top: 6px;
      gap: 6px;
      flex-direction: column;
    }
    .file-note-area.open { display: flex; }
    .file-note-area input {
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 7px 10px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--ink);
      background: var(--note-bg);
    }
    .file-note-area input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
    .file-note-saved {
      font-size: 12px;
      color: var(--good);
      font-style: italic;
      padding: 2px 0;
    }

    /* ---- CoWork strip ---- */
    .cowork {
      background: var(--cowork-bg);
      border-radius: var(--radius);
      padding: var(--card-pad);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cowork .label { color: #a09585; }
    .cowork-history {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
    }
    .cowork-bubble {
      font-size: 13px;
      padding: 8px 11px;
      border-radius: 10px;
      line-height: 1.4;
    }
    .cowork-bubble.user {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
      max-width: 88%;
    }
    .cowork-bubble.claude {
      background: var(--cowork-reply);
      color: var(--cowork-ink);
      align-self: flex-start;
      max-width: 92%;
    }
    .cowork-input-row {
      display: flex;
      gap: 6px;
    }
    .cowork-input-row input {
      flex: 1;
      min-width: 0;
      background: #ffffff;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 9px 11px;
      font-family: var(--font);
      font-size: var(--body-size);
      color: var(--ink);
    }
    .cowork-input-row input::placeholder { color: var(--ink-soft); }
    .cowork-input-row input:focus { outline: none; border-color: var(--accent); }
    .cowork-input-row button {
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 18px;
      line-height: 1;
      width: 38px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .cowork-input-row button:hover { filter: brightness(1.1); }

    /* ---- the action button at the bottom ---- */
    .action {
      width: 100%;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: var(--body-size);
      font-weight: 650;
      padding: 13px 14px;
      cursor: pointer;
      text-align: left;
    }
    .action:hover { filter: brightness(1.05); }
    .action .what { display: block; font-size: 12px; opacity: 0.85; font-weight: 500; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="panel" id="panel"><!-- the panel draws itself in here --></div>

  <!-- the pretend data -->
  <script src="mock.js"></script>

  <!--
    AVAILABLE TEST SCENARIOS (edit mock.js, last line to switch):
    - rich: Margaret Ellison (original — well-populated scenario)
    - sparse: Alex Patterson (unknown contact, minimal data, tests "No data" states)
    - complete: Priya Desai (all features filled in, baseline test)
    - heavyScroll: Robert Kim (6 docs, 5 attachments, 7 notes — stress-tests scrolling)
    - internalTeam: Emma Thompson (internal team member with related people)
    - meetingHeavy: Nicole Foster (5 upcoming meetings — tests meeting overflow)
    - vendorMinimal: James Patterson (vendor with invoice, not in Mesh)
    - documentHeavy: Kevin Martinez (8 documents — extreme scroll test)
  -->

  <!-- the panel: reads MOCK and builds the cards -->
  <script>
    const m = MOCK;

    // a tiny helper so the cards read cleanly below
    const el = (html) => html;

    const panel = `
      <div class="email">
        <div class="subject">${m.email.subject}</div>
        <div class="from">from <b>${m.email.fromName}</b> · ${m.email.fromAddress}</div>
        <div class="preview">"${m.email.preview}"</div>
      </div>

      <!-- FROM / contact -->
      <div class="card">
        <div class="label">From</div>
        ${m.contact.name ? `
          <div class="headline">${m.contact.name}${m.contact.inMesh ? '<span class="pill">in Mesh</span>' : ''}</div>
          <div class="sub">${m.contact.role || 'No role'}</div>
          <div class="row" style="margin-top:8px">
            <span class="main">${m.contact.relationship || 'No relationship'}</span>
            <span class="meta">${m.contact.lastSpoke || '—'}</span>
          </div>
          ${!m.contact.inMesh ? `
            <button id="add-to-mesh-btn" style="margin-top:10px; border:1px solid var(--card-border); background:transparent; border-radius:8px; padding:7px 12px; font-size:13px; color:var(--accent); font-weight:600; cursor:pointer; font-family:var(--font);">+ Add to Mesh</button>
          ` : ''}
        ` : `
          <div style="color: var(--ink-soft); font-size: var(--body-size);">No data</div>
        `}
      </div>

      <!-- PROJECT -->
      ${m.project ? `
      <div class="card">
        <div class="label">Project</div>
        <div class="headline">${m.project.name}<span class="pill">${m.project.stage}</span></div>
        <div class="sub">Map ${m.project.mapNumber} · ${m.project.area}</div>
        <div class="nextstep">Next step — <b>${m.project.nextStep}</b></div>
      </div>
      ` : `
      <div class="card">
        <div class="label">Project</div>
        <div style="color: var(--ink-soft); font-size: var(--body-size);">No data</div>
      </div>
      `}

      <!-- MEETINGS -->
      <div class="card">
        <div class="label">Coming up</div>
        ${m.meetings && m.meetings.length > 0 ?
          m.meetings.slice(0, 2).map(mt => `
            <div class="row">
              <span class="main">${mt.title}</span>
              <span class="meta">${mt.when}</span>
            </div>`).join('') :
          `<div style="color: var(--ink-soft); font-size: var(--body-size);">No data</div>`}
      </div>

      <!-- DOCUMENTS -->
      <div class="card">
        <div class="label">Documents</div>
        ${m.documents && m.documents.length > 0 ?
          `<div class="documents-list">
            ${m.documents.map(d => `
              <div class="row">
                <div class="doc-title">${d.title}</div>
                <div class="doc-location">${d.where}</div>
              </div>`).join('')}
          </div>` :
          `<div style="color: var(--ink-soft); font-size: var(--body-size);">No data</div>`}
      </div>

      <!-- ATTACHMENTS — files on this email; Diane can annotate how each should be filed -->
      <div class="card" id="attachments-card"></div>

      <!-- PAYMENT (only shown if matched) -->
      ${m.payment.matched ? `
      <div class="card">
        <div class="label">Payment</div>
        <div class="headline">${m.payment.amount}
          ${m.payment.matched ? '<span class="pill good">matched</span>' : ''}
        </div>
        <div class="sub">${m.payment.merchant} · ${m.payment.card}</div>
        <div class="row" style="margin-top:8px">
          <span class="main">Receipt ${m.payment.receipt}</span>
          <span class="meta">${m.payment.note}</span>
        </div>
      </div>
      ` : ''}

      <!-- NOTES (Mesh) — Diane's own "what to remember" jottings + related people in her network -->
      <div class="card">
        <div class="label">Notes (Mesh)</div>
        ${(m.contact.relatedPeople || []).length > 0 ? `
        <div style="margin-bottom: 10px; display: flex; gap: 6px; flex-wrap: wrap;">
          ${m.contact.relatedPeople.map(p => `<span class="pill" style="font-size:11px">${p.name} <em style="font-weight:400">(${p.context})</em></span>`).join('')}
        </div>
        ` : ''}
        <div class="note-list-scrollable" id="note-list">
          ${(m.contact.notes || []).map(n => `<div class="note">${n}</div>`).join('')}
        </div>
        <div class="note-add">
          <input id="note-input" type="text" placeholder="Add a note about ${m.contact.name || 'this contact'}..." />
          <button id="note-btn">Add note</button>
        </div>
      </div>

      <!-- COWORK — ask Claude to add tasks, notes, or anything else -->
      <div class="cowork">
        <div class="label">Ask Claude</div>
        <div class="cowork-history" id="cowork-history"></div>
        <div class="cowork-input-row">
          <input id="cowork-input" type="text" placeholder='e.g. "add task: confirm catering headcount"' />
          <button id="cowork-send">↑</button>
        </div>
      </div>
    `;

    document.getElementById('panel').innerHTML = panel;

    // --- quick-add note ---
    // For the studio this just adds the note to the list on screen so Diane can
    // feel the act of jotting one. It is NOT saved anywhere — refreshing the page
    // resets it. (Saving to her real Mesh is the Phase 2 chapter the team wires up.)
    const noteInput = document.getElementById('note-input');
    const noteBtn   = document.getElementById('note-btn');
    const noteList  = document.getElementById('note-list');

    function addNote() {
      const text = noteInput.value.trim();
      if (!text) return;
      const div = document.createElement('div');
      div.className = 'note';
      div.textContent = text;
      noteList.appendChild(div);
      noteInput.value = '';
      noteInput.focus();
    }

    noteBtn.addEventListener('click', addNote);
    noteInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addNote(); });

    // --- Add to Mesh button ---
    const addToMeshBtn = document.getElementById('add-to-mesh-btn');
    if (addToMeshBtn) {
      addToMeshBtn.addEventListener('click', () => {
        const contactName = m.contact.name || 'this contact';
        alert(`✓ ${contactName} has been added to Mesh.\n\nIn Phase 2, this will sync to the real Mesh system.`);
        // In Phase 2, this would call the Mesh API to create a new contact card
      });
    }

    // --- attachments card ---
    // Renders each email attachment with an expandable "Add filing note" input.
    // Notes are local/mock only — Phase 2 sends them to the harvesting engine.
    const attachCard = document.getElementById('attachments-card');
    const kindIcon = { pdf: '📄', xlsx: '📊', docx: '📝', default: '📎' };

    attachCard.innerHTML = `
      <div class="label">Attachments</div>
      <div class="attachments-list">
        ${(m.email.attachments || []).map((a, i) => `
          <div class="attachment-row">
            <div class="attachment-top">
              <span class="attachment-name">${kindIcon[a.kind] || kindIcon.default} ${a.name}</span>
              <span class="attachment-size">${a.size}</span>
            </div>
            <button class="file-note-btn" data-idx="${i}">+ Add filing note</button>
            <div class="file-note-area" id="fna-${i}">
              <input type="text" placeholder='e.g. "05.2 Launch / Contracts — signed copy"' id="fni-${i}" />
              <span class="file-note-saved" id="fns-${i}" style="display:none"></span>
            </div>
          </div>`).join('')}
      </div>`;

    attachCard.querySelectorAll('.file-note-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const i   = btn.dataset.idx;
        const area = document.getElementById(`fna-${i}`);
        const inp  = document.getElementById(`fni-${i}`);
        const saved = document.getElementById(`fns-${i}`);
        if (area.classList.toggle('open')) {
          inp.focus();
          btn.textContent = '✕ Cancel';
        } else {
          btn.textContent = '+ Add filing note';
        }
        inp.addEventListener('keydown', function handler(e) {
          if (e.key !== 'Enter' || !inp.value.trim()) return;
          saved.textContent = `✓ Note saved: "${inp.value.trim()}"`;
          saved.style.display = 'block';
          inp.value = '';
          area.classList.remove('open');
          btn.textContent = '✓ Note added';
          btn.style.color = 'var(--good)';
          btn.style.borderColor = 'var(--good)';
          inp.removeEventListener('keydown', handler);
        });
      });
    });

    // --- CoWork mock chat ---
    // Simulates Claude responding to Diane's requests inside the panel.
    // In Phase 2 this calls a real Claude API with the email context pre-loaded.
    const history  = document.getElementById('cowork-history');
    const cwInput  = document.getElementById('cowork-input');
    const cwSend   = document.getElementById('cowork-send');

    function mockReply(text) {
      const t = text.toLowerCase();
      const contactName = m.contact.name || 'this contact';
      const projectInfo = m.project ? ` · Project: ${m.project.name} · Map ${m.project.mapNumber}` : '';

      if (t.includes('task'))
        return `✓ Task added to Notion — <em>${text.replace(/add task[:\s]*/i,'').trim() || 'new task'}</em>${projectInfo}`;
      if (t.includes('note') && (t.includes(contactName.toLowerCase()) || t.includes('contact')))
        return `✓ Note added to ${contactName}'s Mesh card.`;
      if (t.includes('note'))
        return `✓ Note saved — I've attached it to this conversation.`;
      if (t.includes('draft') || t.includes('reply') || t.includes('email'))
        return `✓ Draft started in Missive — I've pre-filled the context. Opening…`;
      if (t.includes('calendar') || t.includes('meeting') || t.includes('schedule'))
        return `✓ I can check for upcoming meetings with ${contactName}. Would you like me to add or update one?`;
      if (t.includes('file') || t.includes('document') || t.includes('attachment'))
        return m.project ? `✓ Got it — I'll route the attachment to Drive / ${m.project.mapNumber} ${m.project.name}.` : `✓ Got it — I'll file that attachment for you.`;
      return `Got it — noted. Anything else for this email?`;
    }

    function sendCowork() {
      const text = cwInput.value.trim();
      if (!text) return;

      const userBubble = document.createElement('div');
      userBubble.className = 'cowork-bubble user';
      userBubble.textContent = text;
      history.appendChild(userBubble);
      cwInput.value = '';

      setTimeout(() => {
        const claudeBubble = document.createElement('div');
        claudeBubble.className = 'cowork-bubble claude';
        claudeBubble.innerHTML = mockReply(text);
        history.appendChild(claudeBubble);
        history.scrollTop = history.scrollHeight;
      }, 420);

      history.scrollTop = history.scrollHeight;
    }

    cwSend.addEventListener('click', sendCowork);
    cwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCowork(); });

    // --- theme detection (Missive light/dark mode) ---
    // Watch for Missive's data-theme attribute changes and respond.
    // Our CSS custom properties auto-update via Missive's stylesheet.
    const themeObserver = new MutationObserver((mutations) => {
      mutations.forEach(m => {
        if (m.attributeName === 'data-theme') {
          const theme = document.documentElement.getAttribute('data-theme');
          // CSS variables update automatically (Missive stylesheet handles it)
          // Uncomment below if you need to trigger JS-side theme logic:
          // console.log(`Theme changed to: ${theme}`);
        }
      });
    });
    themeObserver.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-theme']
    });

    // Also detect system preference (if Missive hasn't set data-theme yet)
    if (window.matchMedia) {
      const darkModeQuery = window.matchMedia('(prefers-color-scheme: dark)');
      darkModeQuery.addListener(() => {
        // Refresh if system theme changes and Missive theme isn't set
        if (!document.documentElement.getAttribute('data-theme')) {
          // Panel already responds via CSS media query, no action needed
        }
      });
    }
  </script>
